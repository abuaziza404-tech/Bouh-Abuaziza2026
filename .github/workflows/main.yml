name: Build BOUH GOLD PRO ULTRA v12.4 APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    name: إنشاء APK قابل للتثبيت
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Locate Flutter project
        shell: bash
        run: |
          set -e

          if [ -f "pubspec.yaml" ]; then
            echo "PROJECT_DIR=$GITHUB_WORKSPACE" >> $GITHUB_ENV
            exit 0
          fi

          ZIP_FILE=$(find . -maxdepth 2 -type f -iname "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No Flutter project or ZIP package found."
            exit 1
          fi

          mkdir -p /tmp/bouh_app
          unzip -o "$ZIP_FILE" -d /tmp/bouh_app

          PROJECT_PATH=$(find /tmp/bouh_app -type f -name "pubspec.yaml" | head -n 1 | xargs dirname)

          if [ -z "$PROJECT_PATH" ]; then
            echo "No pubspec.yaml found inside ZIP."
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_PATH" >> $GITHUB_ENV

      - name: Show Flutter version
        run: flutter --version

      - name: Generate Android platform files
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -d "android" ]; then
            flutter create --project-name bouh_gold_pro_ultra --org com.bouh.gold --platforms=android .
          fi

      - name: Add Android permissions
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          python3 - <<'PY'
          from pathlib import Path

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if not manifest.exists():
              raise SystemExit("AndroidManifest.xml not found")

          text = manifest.read_text()

          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
          ]

          for p in permissions:
              text = text.replace(p, "")

          lines = text.splitlines()
          insert_at = 0
          for i, line in enumerate(lines):
              if "<manifest" in line:
                  insert_at = i + 1
                  break

          for p in reversed(permissions):
              lines.insert(insert_at, p)

          manifest.write_text("\n".join(lines))
          PY

      - name: Clean Flutter project
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter clean

      - name: Install dependencies
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter pub get

      - name: Analyze project
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter analyze || true

      - name: Build installable debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: flutter build apk --debug

      - name: Prepare APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mkdir -p build-output
          cp build/app/outputs/flutter-apk/app-debug.apk build-output/BOUH-GOLD-PRO-ULTRA-v12-4-INSTALL.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BOUH-GOLD-PRO-ULTRA-v12-4-INSTALL-APK
          path: ${{ env.PROJECT_DIR }}/build-output/BOUH-GOLD-PRO-ULTRA-v12-4-INSTALL.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bouh-v12-4-install-${{ github.run_number }}
          name: BOUH GOLD PRO ULTRA v12.4 Installable APK
          body: |
            BOUH GOLD PRO ULTRA v12.4
            تطبيق بوح التضاريس — نسخة Android قابلة للتثبيت مباشرة.
            Developer: Eng. Ahmed Abuaziza
          files: ${{ env.PROJECT_DIR }}/build-output/BOUH-GOLD-PRO-ULTRA-v12-4-INSTALL.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
