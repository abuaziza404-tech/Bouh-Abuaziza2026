name: Build BOUH GOLD PRO ULTRA v12.6 Install APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-android:
    name: إنشاء APK قابل للتثبيت
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create clean BOUH Flutter source
        run: |
          rm -rf lib test android ios web linux macos windows build .dart_tool pubspec.yaml pubspec.lock
          mkdir -p lib
          echo '' | base64 -d > pubspec.yaml
          echo '' | base64 -d > lib/main.dart
          echo 'تم إنشاء pubspec.yaml و lib/main.dart تلقائياً داخل بيئة البناء'
          head -n 20 pubspec.yaml
          head -n 20 lib/main.dart

      - name: Generate Android platform files
        run: flutter create --project-name bouh_gold_pro_ultra --org com.bouh.gold --platforms=android .

      - name: Fix Android manifest and minSdk
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <application
                  android:label="BOUH GOLD PRO ULTRA"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          EOF
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle || true
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 23/g' android/app/build.gradle || true
          fi
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle.kts || true
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 23/g' android/app/build.gradle.kts || true
          fi

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean Flutter project
        run: flutter clean

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze || true

      - name: Build installable debug APK
        run: flutter build apk --debug -v

      - name: Prepare APK
        run: |
          mkdir -p build-output
          cp build/app/outputs/flutter-apk/app-debug.apk build-output/BOUH-GOLD-PRO-ULTRA-v12-6-INSTALL.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BOUH-GOLD-PRO-ULTRA-v12-6-INSTALL-APK
          path: build-output/BOUH-GOLD-PRO-ULTRA-v12-6-INSTALL.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bouh-v12-6-install-${{ github.run_number }}
          name: BOUH GOLD PRO ULTRA v12.6 Installable APK
          body: |
            BOUH GOLD PRO ULTRA v12.6
            تطبيق بوح التضاريس — نسخة Android قابلة للتثبيت مباشرة.
            كلمة المرور: Abuaziza2000
          files: build-output/BOUH-GOLD-PRO-ULTRA-v12-6-INSTALL.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
